# Netlify 設定

[build]
  publish = "."

# 封鎖 old/ 備份資料夾，不對外公開
[[redirects]]
  from = "/old/*"
  to = "/404.html"
  status = 404
  force = true

# 封鎖協作規則與部署腳本
[[redirects]]
  from = "/GameVault_協作規則.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/github_deploy.py"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/CHANGELOG.md"
  to = "/404.html"
  status = 404
  force = true
